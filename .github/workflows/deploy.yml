name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 테스트 및 프로젝트 빌드
        run: ./gradlew clean test bootJar --no-daemon

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Docker 이미지 빌드
        run: |
          docker build --platform linux/amd64 \
            -t sungminju/weartrack:todayter-latest .

      - name: Docker 이미지 푸시
        run: |
          docker push sungminju/weartrack:todayter-latest

      - name: GitHub Actions 실행자 IP 확인
        id: runner_ip
        run: |
          echo "ipv4=$(curl -fsS https://checkip.amazonaws.com)" \
            >> "$GITHUB_OUTPUT"

      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SSH 포트 임시 허용
        env:
          SECURITY_GROUP_ID: ${{ secrets.EC2_SECURITY_GROUP_ID }}
          SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          RUNNER_CIDR: ${{ steps.runner_ip.outputs.ipv4 }}/32
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$SECURITY_GROUP_ID" \
            --protocol tcp \
            --port "$SSH_PORT" \
            --cidr "$RUNNER_CIDR"

      - name: SSH 설정
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          SERVER_IP: ${{ secrets.LIVE_SERVER_IP }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          mkdir -p ~/.ssh

          printf '%s\n' "$SSH_KEY" > ~/.ssh/todayter-key.pem
          chmod 600 ~/.ssh/todayter-key.pem

          ssh-keyscan -p "$SSH_PORT" -H "$SERVER_IP" \
            >> ~/.ssh/known_hosts

          {
            echo "Host todayter-ec2"
            echo "  HostName $SERVER_IP"
            echo "  User $EC2_USERNAME"
            echo "  Port $SSH_PORT"
            echo "  IdentityFile ~/.ssh/todayter-key.pem"
          } >> ~/.ssh/config

      - name: EC2 배포
        run: |
          ssh todayter-ec2 << 'EOF'
            set -euo pipefail

            cd "$HOME/app"

            docker compose pull todayter-app
            docker compose up -d todayter-app
            docker compose ps

            docker image prune -f
          EOF

      - name: SSH 포트 임시 허용 제거
        if: ${{ always() && steps.runner_ip.outputs.ipv4 != '' }}
        env:
          SECURITY_GROUP_ID: ${{ secrets.EC2_SECURITY_GROUP_ID }}
          SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          RUNNER_CIDR: ${{ steps.runner_ip.outputs.ipv4 }}/32
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$SECURITY_GROUP_ID" \
            --protocol tcp \
            --port "$SSH_PORT" \
            --cidr "$RUNNER_CIDR" || true
