services:
  mysql:
    image: mysql:8.4
    container_name: todayter-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-todayter}
      MYSQL_USER: ${DB_USER:-todayter}
      MYSQL_PASSWORD: ${DB_PW:-todayter}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  adminer:
    image: adminer:latest
    container_name: todayter-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mysql-data:
