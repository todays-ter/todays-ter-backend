spring:
  application:
    name: todayter

  config:
    import: optional:file:./.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PW}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET}
  access-expire: ${JWT_ACCESS_TOKEN_EXPIRE_MS}
  refresh-expire: ${JWT_REFRESH_TOKEN_EXPIRE_MS}

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info