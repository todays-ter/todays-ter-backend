# https://docs.coderabbit.ai/guides/configure-coderabbit

language: "ko"

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true

chat:
  auto_reply: true